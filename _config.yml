# Syntax highlighting
highlighter:         pygments
title: Kate Loginova
email: ekaterina.d.loginova@gmail.com
url: https://edloginova.github.io
description: "I am Kate, a PhD student in educational data mining. Also a graduate of Artificial Intelligence Advanced Master program in KU Leuven. If you are open for an interesting collaboration, let me know!"
skills: "Artificial Intelligence - Natural Language Processing - Data Science"
meta_author: Ekaterina Loginova
theme: minima
# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: disqus

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  primary-rgb: "24,288,156" #"128,179,255"
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Dr. Henry Jekyll
  location: Location
  social: Social networks
  credits: Credits

  social:
  - title: linkedin
    url: https://www.linkedin.com/in/edloginova/
  - title: facebook
    url: https://www.facebook.com/jekaterina.ld
  - title: github
    url: https://github.com/edloginova
  - title: skype
    url: callto:edloginova

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: edloginova
# Permalinks
#
# Use of `relative_permalinks` ensures post links from the index work properly.
permalink:           pretty

# Setup
title:               Kate Loginova
tagline:             natural language processing & educational data mining
url:                 http://edloginova.github.io
baseurl:             /

# Assets
#
# We specify the directory for Jekyll so we can use @imports.
sass:
  sass_dir:          _scss
  style:            :compressed
